<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vlclone - self-hosted streaming server</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
        <h1>vlclone</h1>
        <div id="viewer-container">
            <video id="videoPlayer" controls></video>
            <img id="imageViewer" src="" alt="preview">
            <h3 id="nowPlaying">Select a file</h3>
        </div>

        <div id="search-container">
            <input type="text" id="searchInput" placeholder="Search your media..." onkeyup="filterFiles()">
        </div>
    </center>

    <div id="library"></div>
    <div id="log-container">
        <div id="activityLog"></div>
    </div>
    
    <video id="videoPlayer" controls playsinline preload="metadata">
    <source id="videoSource" src="" type="video/mp4">
    Your browser does not support the video tag.
    </video>

    <script src="script.js"></script>
</body>
</html>
